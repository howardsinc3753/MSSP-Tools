# ============================================================================
# DRIFT PREVENTION FOR AI ENGINEERS
# ============================================================================
# When adding new features to the SD-WAN workflow:
#
# 1. UPDATE THIS CONTRACT FIRST
#    - Add new parameters to parameter_handoffs
#    - Add new naming conventions if needed
#    - Update tool_versions if minimum version changes
#
# 2. THEN UPDATE THE BLOCKS
#    - BLOCK_*.yaml files must reference parameters exactly as named here
#    - Use aliases only when absolutely necessary (legacy compatibility)
#
# 3. THEN UPDATE THE TOOLS
#    - Blueprint-planner defaults must match naming_conventions
#    - Tool outputs must match parameter_handoffs types
#
# 4. RUN VALIDATION
#    - python scripts/validate_sdwan_contract.py
#    - All checks must pass before committing
#
# The contract is the source of truth. When in doubt, check this file.
# ============================================================================
