#   python scripts/validate_sdwan_contract.py \
#       --contract workflows/add-sdwan-site/CONTRACT_SCHEMA.yaml \
#       --manifest workflows/add-sdwan-site/manifest.yaml \
#       --blocks workflows/add-sdwan-site/blocks/
#
# Checks performed:
# 1. Naming convention compliance (HUB1-VPN1, not HUB1_VPN1)
# 2. Parameter handoffs (all required params flow through blocks)
# 3. Tool version requirements (minimum versions met)
# 4. Alias resolution (ipsec_psk → vpn_psk mapping exists)
