# ATOMIC_HUB_TEMPLATE.conf
# SD-WAN Hub Complete Configuration Template
# Composed from Blocks 020-029
# Version: 1.0.0
# Date: 2026-02-05

# ============================================================================
# SECTION 1: System Global Settings (Block 020)
# ============================================================================

config system global
    set hostname "{{HUB_HOSTNAME}}"
    set timezone {{TIMEZONE}}
    set admintimeout {{ADMINTIMEOUT}}
    set rest-api-key-url-query {{REST_API_KEY_URL_QUERY}}
end

# ============================================================================
# SECTION 2: System Settings (Block 021)
# ============================================================================

config system settings
    set location-id {{LOCATION_ID}}
    set ike-tcp-port {{IKE_TCP_PORT}}
end

# ============================================================================
# SECTION 3: Interface Configuration (Block 022)
# Dual Loopback Architecture: Hub_Lo + BGP_Lo
# ============================================================================

config system interface
    edit "{{WAN_INTERFACE}}"
        set vdom "root"
        set ip {{WAN_IP_CIDR}}
        set allowaccess ping https ssh http fgfm
        set type physical
        set alias "WAN"
        set lldp-reception enable
        set role wan
    next
    edit "{{LAN_INTERFACE}}"
        set vdom "root"
        set ip {{LAN_IP_CIDR}}
        set allowaccess ping https ssh http
        set type physical
        set alias "LAN"
        set role lan
    next
    edit "Hub_Lo"
        set vdom "root"
        set ip {{HUB_LOOPBACK_IP}} 255.255.255.255
        set allowaccess ping
        set type loopback
        set alias "Hub Loopback"
        set role undefined
    next
    edit "BGP_Lo"
        set vdom "root"
        set ip {{BGP_LOOPBACK_IP}} 255.255.255.255
        set allowaccess ping
        set type loopback
        set alias "BGP Loopback"
        set role undefined
    next
end

# ============================================================================
# SECTION 4: IPsec Phase1 Dynamic Templates (Block 023)
# Hub accepts spoke connections via type=dynamic
# ============================================================================

config vpn ipsec phase1-interface
    edit "SPOKE_VPN1"
        set type dynamic
        set interface "{{WAN_INTERFACE}}"
        set ike-version {{IKE_VERSION}}
        set local-gw {{HUB_WAN_IP}}
        set peertype any
        set authmethod psk
        set psksecret {{PSK}}
        set proposal {{PROPOSAL}}
        set dpd on-idle
        set dpd-retrycount 3
        set dpd-retryinterval 5
        set dhgrp {{DHGRP}}
        set nattraversal enable
        set add-route disable
        set auto-discovery-sender enable
        set network-overlay enable
        set network-id {{NETWORK_ID_VPN1}}
        set exchange-ip-addr4 {{HUB_BGP_LOOPBACK}}
        set mode-cfg disable
        set net-device disable
        set transport udp
    next
    edit "SPOKE_VPN2"
        set type dynamic
        set interface "{{WAN_INTERFACE}}"
        set ike-version {{IKE_VERSION}}
        set local-gw {{HUB_WAN_IP}}
        set peertype any
        set authmethod psk
        set psksecret {{PSK}}
        set proposal {{PROPOSAL}}
        set dpd on-idle
        set dpd-retrycount 2
        set dpd-retryinterval 3
        set dhgrp {{DHGRP}}
        set nattraversal enable
        set add-route disable
        set auto-discovery-sender enable
        set network-overlay enable
        set network-id {{NETWORK_ID_VPN2}}
        set exchange-ip-addr4 {{HUB_BGP_LOOPBACK}}
        set mode-cfg disable
        set net-device disable
        set transport udp
    next
end

# ============================================================================
# SECTION 5: IPsec Phase2 Templates (Block 024)
# ============================================================================

config vpn ipsec phase2-interface
    edit "SPOKE_VPN1"
        set phase1name "SPOKE_VPN1"
        set proposal {{PROPOSAL}}
        set dhgrp {{DHGRP}}
        set src-subnet 0.0.0.0 0.0.0.0
        set dst-subnet 0.0.0.0 0.0.0.0
    next
    edit "SPOKE_VPN2"
        set phase1name "SPOKE_VPN2"
        set proposal {{PROPOSAL}}
        set dhgrp {{DHGRP}}
        set src-subnet 0.0.0.0 0.0.0.0
        set dst-subnet 0.0.0.0 0.0.0.0
    next
end

# ============================================================================
# SECTION 6: BGP Base Configuration (Block 025)
# ============================================================================

config router bgp
    set as {{BGP_AS}}
    set router-id {{ROUTER_ID}}
    set ibgp-multipath {{IBGP_MULTIPATH}}
    set ebgp-multipath enable
    set additional-path enable
    set additional-path-select 4
    set recursive-next-hop enable
    set recursive-inherit-priority enable
    set graceful-restart {{GRACEFUL_RESTART}}
    set graceful-restart-time 120
    set graceful-stalepath-time 360
    set holdtime-timer {{HOLDTIME_TIMER}}
    set keepalive-timer {{KEEPALIVE_TIMER}}
end

# ============================================================================
# SECTION 7: BGP Neighbor Range for Dynamic Spoke Sessions (Block 026)
# ============================================================================

config router bgp
    config neighbor-group
        edit "{{NEIGHBOR_GROUP_NAME}}"
            set activate enable
            set advertisement-interval 1
            set link-down-failover enable
            set next-hop-self enable
            set soft-reconfiguration enable
            set remote-as {{REMOTE_AS}}
        next
    end
    config neighbor-range
        edit 1
            set prefix {{NEIGHBOR_RANGE_PREFIX}} {{NEIGHBOR_RANGE_NETMASK}}
            set neighbor-group "{{NEIGHBOR_GROUP_NAME}}"
        next
    end
    config network
        edit 1
            set prefix {{ADVERTISED_NETWORKS}} {{ADVERTISED_NETMASK}}
        next
    end
end

# ============================================================================
# SECTION 8: SD-WAN Zone and Members (Block 027)
# ============================================================================

config system sdwan
    set status enable
    config zone
        edit "{{ZONE_NAME}}"
            set advpn-select enable
        next
    end
    config members
        edit {{MEMBER_SEQ_VPN1}}
            set interface "SPOKE_VPN1"
            set zone "{{ZONE_NAME}}"
        next
        edit {{MEMBER_SEQ_VPN2}}
            set interface "SPOKE_VPN2"
            set zone "{{ZONE_NAME}}"
        next
    end
end

# ============================================================================
# SECTION 9: SD-WAN Health Check (Block 028)
# ============================================================================

config system sdwan
    config health-check
        edit "{{HEALTH_CHECK_NAME}}"
            set server "{{HEALTH_CHECK_TARGET}}"
            set protocol ping
            set interval {{INTERVAL_MS}}
            set failtime {{FAILTIME_SECONDS}}
            set recoverytime {{RECOVERYTIME_SECONDS}}
            set update-cascade-interface enable
            set update-static-route enable
            set sla-id-redistribute 1
            config sla
                edit 1
                    set link-cost-factor latency jitter packet-loss
                    set latency-threshold 200
                    set jitter-threshold 50
                    set packetloss-threshold 5
                next
            end
        next
    end
end

# ============================================================================
# SECTION 10: Firewall Policies (Block 029) - v1.1.0 GPOT FIXES
# ============================================================================
# CRITICAL: Uses edit 0 for auto-assign IDs to avoid overwriting existing policies
# SECURITY: REMOVED dangerous WAN_to_LAN policy (was allow-all from WAN to LAN)
# Based on production hub howard-sdwan-hub-1 (10.0.1.1)

config firewall policy
    edit 0
        set name "SDWAN_Overlay_Traffic"
        set srcintf "Hub_Lo" "{{ZONE_NAME}}"
        set dstintf "Hub_Lo" "{{ZONE_NAME}}"
        set action accept
        set srcaddr "all"
        set dstaddr "all"
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set comments "Hub loopback + overlay bidirectional - spoke-to-spoke via hub"
    next
    edit 0
        set name "SDWAN_OL_To_Port2"
        set srcintf "{{ZONE_NAME}}"
        set dstintf "{{LAN_INTERFACE}}"
        set action accept
        set srcaddr "all"
        set dstaddr "all"
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set nat enable
        set comments "Spoke access to hub LAN resources"
    next
    edit 0
        set name "SDWAN-BGP-LOOPBACK"
        set srcintf "{{ZONE_NAME}}"
        set dstintf "BGP_Lo"
        set action accept
        set srcaddr "all"
        set dstaddr "all"
        set schedule "always"
        set service "ALL"
        set comments "Spoke BGP sessions to hub BGP loopback"
    next
    edit 0
        set name "BGP-TO-SDWAN"
        set srcintf "BGP_Lo"
        set dstintf "{{ZONE_NAME}}"
        set action accept
        set srcaddr "all"
        set dstaddr "all"
        set schedule "always"
        set service "ALL"
        set comments "Hub BGP replies to spokes"
    next
    edit 0
        set name "SDWAN-to-INET"
        set srcintf "{{ZONE_NAME}}"
        set dstintf "{{WAN_INTERFACE}}"
        set action accept
        set srcaddr "all"
        set dstaddr "all"
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set nat enable
        set comments "Spoke internet breakout via hub (central breakout)"
    next
end

# ============================================================================
# END OF ATOMIC HUB TEMPLATE
# ============================================================================

# REQUIRED PARAMETERS:
# System
# - HUB_HOSTNAME: string (e.g., "sdwan-hub-primary")
# - TIMEZONE: string (default "US/Pacific")
# - ADMINTIMEOUT: integer (default 480)
# - REST_API_KEY_URL_QUERY: string (default "enable")
# - LOCATION_ID: ip_address (default "0.0.0.0")
# - IKE_TCP_PORT: integer (default 11443)
#
# Interfaces
# - WAN_INTERFACE: string (default "port1")
# - WAN_IP_CIDR: cidr (e.g., "10.0.1.1/24")
# - LAN_INTERFACE: string (default "port2")
# - LAN_IP_CIDR: cidr (e.g., "10.250.250.1/24")
# - HUB_LOOPBACK_IP: ip_address (e.g., "172.16.255.253")
# - BGP_LOOPBACK_IP: ip_address (e.g., "172.16.255.252")
#
# IPsec
# - PSK: string (sensitive)
# - NETWORK_ID_VPN1: integer (default 1)
# - NETWORK_ID_VPN2: integer (default 2)
# - HUB_WAN_IP: ip_address (same as WAN_IP without CIDR)
# - IKE_VERSION: integer (default 2)
# - PROPOSAL: string (default "aes256-sha256")
# - DHGRP: string (default "20 21")
# - HUB_BGP_LOOPBACK: ip_address (same as BGP_LOOPBACK_IP)
#
# BGP
# - BGP_AS: integer (default 65000)
# - ROUTER_ID: ip_address (same as BGP_LOOPBACK_IP)
# - IBGP_MULTIPATH: string (default "enable")
# - GRACEFUL_RESTART: string (default "enable")
# - HOLDTIME_TIMER: integer (default 180)
# - KEEPALIVE_TIMER: integer (default 60)
# - NEIGHBOR_GROUP_NAME: string (default "EDGE")
# - NEIGHBOR_RANGE_PREFIX: string (default "172.16.0.0")
# - NEIGHBOR_RANGE_NETMASK: string (default "255.255.0.0")
# - REMOTE_AS: integer (default 65000)
# - ADVERTISED_NETWORKS: string (e.g., "10.250.250.0")
# - ADVERTISED_NETMASK: string (e.g., "255.255.255.0")
#
# SD-WAN
# - ZONE_NAME: string (default "SDWAN_OVERLAY")
# - MEMBER_SEQ_VPN1: integer (default 100) - NOTE: Hub seq ≠ spoke seq (GAP-51)
# - MEMBER_SEQ_VPN2: integer (default 2) - Hub uses 100/2, spokes use 3/4
# - HEALTH_CHECK_NAME: string (default "From_Edge")
# - HEALTH_CHECK_TARGET: ip_address (same as BGP_LOOPBACK_IP)
# - INTERVAL_MS: integer (default 1000)
# - FAILTIME_SECONDS: integer (default 5)
# - RECOVERYTIME_SECONDS: integer (default 5)
#
# NOTES:
# - LOCATION_ID accepts IP address format (0.0.0.0 = use WAN IP)
# - Hub member seq (100/2) is independent from spoke member seq (3/4 per GAP-51)
# - Firewall policies use edit 0 (auto-assign ID) to avoid overwriting
# - v1.1.0 GPOT FIXES: Removed WAN_to_LAN policy, added BGP loopback policies
