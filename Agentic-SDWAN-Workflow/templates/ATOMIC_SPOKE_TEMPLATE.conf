# ============================================================================
# SD-WAN Spoke - Atomic Configuration Template
# Version: 2.0.0
# Last Updated: 2026-01-26
# ============================================================================
# USAGE: Replace all {{PARAMETER}} placeholders with site-specific values
#
# Required Parameters:
#   {{SITE_ID}}           - Site number (e.g., 7)
#   {{HOSTNAME}}          - Device hostname (e.g., sdwan-spoke-07)
#   {{LOOPBACK_IP}}       - Loopback IP: 172.16.0.{{SITE_ID}}
#   {{LAN_SUBNET}}        - LAN network (e.g., 10.7.1.0)
#   {{LAN_GATEWAY}}       - LAN gateway (e.g., 10.7.1.1)
#   {{LAN_MASK}}          - LAN netmask (e.g., 255.255.255.0)
#   {{LAN_SUBNET_START}}  - DHCP range start (e.g., 10.7.1.2)
#   {{LAN_SUBNET_END}}    - DHCP range end (e.g., 10.7.1.254)
#   {{PSK_SECRET}}        - IPsec pre-shared key (default: password)
#
# Fixed Parameters (from BASELINE_TEMPLATE.yaml):
#   HUB_WAN_IP          = 192.168.215.15
#   HUB_BGP_PEER        = 172.16.255.252
#   HUB_HEALTH_TARGET   = 172.16.255.253
#   BGP_AS              = 65000
#   IKE_TCP_PORT        = 11443
#   ZONE_NAME           = SDWAN_OVERLAY
#   HEALTH_CHECK_NAME   = HUB_Health
#
# ============================================================================
# SECTION ORDERING (critical for dependencies):
#   1. System global
#   2. System settings
#   3. System interface (port1, port2, Spoke-Lo) — NO tunnel interfaces
#   4. DHCP server
#   5. IPsec phase1 (auto-creates tunnel interfaces)
#   6. IPsec phase2
#   7. Tunnel interface settings (allowaccess AFTER phase1 creates them)
#   8. Static routes
#   9. Firewall addresses
#  10. BGP (MUST come BEFORE SD-WAN neighbor)
#  11. SD-WAN (zone, members, health-check, neighbor)
#  12. Firewall policies
# ============================================================================

# --- Section 1: System Global ---
config system global
    set hostname "{{HOSTNAME}}"
    set rest-api-key-url-query enable
end

# --- Section 2: System Settings ---
config system settings
    set location-id {{LOOPBACK_IP}}
    set ike-tcp-port 11443
end

# --- Section 3: Interfaces (port1, port2, Spoke-Lo ONLY) ---
# DO NOT define HUB1-VPN1/VPN2 here — they are auto-created by phase1
config system interface
    edit "port1"
        set vdom "root"
        set mode dhcp
        set allowaccess ping https ssh http fgfm
        set role wan
    next
    edit "port2"
        set vdom "root"
        set ip {{LAN_GATEWAY}} {{LAN_MASK}}
        set allowaccess ping https ssh
        set alias "LAN"
        set device-identification enable
        set role lan
    next
    edit "Spoke-Lo"
        set vdom "root"
        set ip {{LOOPBACK_IP}} 255.255.255.255
        set allowaccess ping
        set type loopback
    next
end

# --- Section 4: LAN DHCP Server ---
config system dhcp server
    edit 1
        set dns-service default
        set default-gateway {{LAN_GATEWAY}}
        set netmask {{LAN_MASK}}
        set interface "port2"
        config ip-range
            edit 1
                set start-ip {{LAN_SUBNET_START}}
                set end-ip {{LAN_SUBNET_END}}
            next
        end
    next
end

# --- Section 5: IPsec Phase1 (creates tunnel interfaces) ---
config vpn ipsec phase1-interface
    edit "HUB1-VPN1"
        set interface "port1"
        set ike-version 2
        set peertype any
        set net-device enable
        set exchange-ip-addr4 {{LOOPBACK_IP}}
        set proposal aes256-sha256
        set add-route disable
        set localid "spoke-HUB1-VPN1"
        set dpd on-idle
        set dhgrp 20 21
        set auto-discovery-sender enable
        set auto-discovery-receiver enable
        set network-overlay enable
        set network-id 1
        set transport udp
        set remote-gw 192.168.215.15
        set psksecret {{PSK_SECRET}}
        set dpd-retryinterval 5
    next
    edit "HUB1-VPN2"
        set interface "port1"
        set ike-version 2
        set peertype any
        set net-device enable
        set exchange-ip-addr4 {{LOOPBACK_IP}}
        set proposal aes256-sha256
        set add-route disable
        set localid "spoke-HUB1-VPN2"
        set dpd on-idle
        set dhgrp 20 21
        set auto-discovery-sender enable
        set auto-discovery-receiver enable
        set network-overlay enable
        set network-id 2
        set transport udp
        set remote-gw 192.168.215.15
        set psksecret {{PSK_SECRET}}
        set dpd-retryinterval 5
    next
end

# --- Section 6: IPsec Phase2 ---
config vpn ipsec phase2-interface
    edit "HUB1-VPN1"
        set phase1name "HUB1-VPN1"
        set proposal aes256-sha256
        set dhgrp 20 21
        set auto-negotiate enable
    next
    edit "HUB1-VPN2"
        set phase1name "HUB1-VPN2"
        set proposal aes256-sha256
        set dhgrp 20 21
        set auto-negotiate enable
    next
end

# --- Section 7: Tunnel Interface Settings (AFTER phase1 creates them) ---
config system interface
    edit "HUB1-VPN1"
        set allowaccess ping
    next
    edit "HUB1-VPN2"
        set allowaccess ping
    next
end

# --- Section 8: Static Routes to Hub Loopbacks (CRITICAL for BGP) ---
config router static
    edit 900
        set dst 172.16.255.252 255.255.255.255
        set device "HUB1-VPN1"
        set comment "Hub BGP loopback via VPN1"
    next
    edit 901
        set dst 172.16.255.253 255.255.255.255
        set device "HUB1-VPN1"
        set comment "Hub health-check loopback via VPN1"
    next
    edit 902
        set dst 172.16.255.252 255.255.255.255
        set device "HUB1-VPN2"
        set comment "Hub BGP loopback via VPN2"
    next
    edit 903
        set dst 172.16.255.253 255.255.255.255
        set device "HUB1-VPN2"
        set comment "Hub health-check loopback via VPN2"
    next
end

# --- Section 9: Firewall Addresses ---
config firewall address
    edit "{{HOSTNAME}}-LAN"
        set subnet {{LAN_SUBNET}} {{LAN_MASK}}
    next
    edit "ACME_Loopback"
        set subnet 172.16.0.0 255.255.0.0
    next
end

# --- Section 10: BGP (MUST come BEFORE SD-WAN neighbor) ---
config router bgp
    set as 65000
    set router-id {{LOOPBACK_IP}}
    set ibgp-multipath enable
    set recursive-next-hop enable
    set scan-time 5
    set graceful-restart enable
    config neighbor
        edit "172.16.255.252"
            set advertisement-interval 1
            set capability-graceful-restart enable
            set soft-reconfiguration enable
            set interface "Spoke-Lo"
            set remote-as 65000
            set connect-timer 1
            set update-source "Spoke-Lo"
        next
    end
    config neighbor-group
        edit "DYN_EDGE"
            set advertisement-interval 1
            set capability-graceful-restart enable
            set next-hop-self enable
            set soft-reconfiguration enable
            set interface "Spoke-Lo"
            set remote-as 65000
            set update-source "Spoke-Lo"
        next
    end
    config neighbor-range
        edit 1
            set prefix 172.16.0.0 255.255.0.0
            set neighbor-group "DYN_EDGE"
        next
    end
    config redistribute "connected"
        set status enable
    end
end

# --- Section 11: SD-WAN (zone, members, health-check, neighbor) ---
# NOTE: Entire block AFTER BGP so neighbor 172.16.255.252 exists
config system sdwan
    set status enable
    config zone
        edit "virtual-wan-link"
        next
        edit "SDWAN_OVERLAY"
            set advpn-select enable
            # NOTE: advpn-health-check "HUB_Health" is set in Section 11b below
            # Setting it here causes "entry not found" because HUB_Health
            # isn't defined until config health-check (GAP-49 ordering dependency)
        next
    end
    config members
        edit 3
            set interface "HUB1-VPN1"
            set zone "SDWAN_OVERLAY"
            set source {{LOOPBACK_IP}}
            set priority-in-sla 10
            set priority-out-sla 20
        next
        edit 4
            set interface "HUB1-VPN2"
            set zone "SDWAN_OVERLAY"
            set source {{LOOPBACK_IP}}
            set priority-in-sla 20
            set priority-out-sla 10
        next
    end
    config health-check
        edit "HUB_Health"
            set server "172.16.255.253"
            set update-cascade-interface disable
            set update-static-route disable
            set embed-measured-health enable
            set sla-id-redistribute 1
            set sla-fail-log-period 10
            set sla-pass-log-period 10
            set members 3 4
            config sla
                edit 1
                    set latency-threshold 200
                    set jitter-threshold 50
                    set packetloss-threshold 5
                next
            end
        next
    end
    config neighbor
        edit "172.16.255.252"
            set member 3 4
            set route-metric priority
            set health-check "HUB_Health"
            # NOTE: Do NOT set sla-id here — parse error in FortiOS 7.6.5 (GAP-44)
            # Health-check SLA binding works via sla-id-redistribute in health-check section
        next
    end
end

# --- Section 11b: ADVPN Health-Check Binding (AFTER health-check exists) ---
# GAP-49: advpn-health-check references HUB_Health which is created in Section 11.
# Setting it inside the zone definition (before health-check) causes "entry not found".
# This separate section sets it AFTER HUB_Health exists.
config system sdwan
    config zone
        edit "SDWAN_OVERLAY"
            set advpn-health-check "HUB_Health"
        next
    end
end

# --- Section 12: Firewall Policies (use ZONE, not tunnel interfaces) ---
config firewall policy
    edit 1
        set name "{{HOSTNAME}} to Corporate"
        set srcintf "port2"
        set dstintf "SDWAN_OVERLAY"
        set action accept
        set srcaddr "{{HOSTNAME}}-LAN"
        set dstaddr "all"
        set schedule "always"
        set service "ALL"
        set logtraffic all
    next
    edit 2
        set name "Corporate to {{HOSTNAME}}"
        set srcintf "SDWAN_OVERLAY"
        set dstintf "port2"
        set action accept
        set srcaddr "all"
        set dstaddr "{{HOSTNAME}}-LAN"
        set schedule "always"
        set service "ALL"
        set logtraffic all
    next
    edit 3
        set name "Health Check - Peering"
        set srcintf "Spoke-Lo" "SDWAN_OVERLAY"
        set dstintf "Spoke-Lo" "SDWAN_OVERLAY"
        set action accept
        set srcaddr "ACME_Loopback"
        set dstaddr "ACME_Loopback"
        set schedule "always"
        set service "ALL"
    next
end
